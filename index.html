<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>MonStreamTv</title>
  <meta name="description" content="" />
  <meta name="theme-color" content="#0b1220" />

  <!-- Favicon (logo onglet navigateur) -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <link rel="stylesheet" href="style.css?v=7" />
</head>

<body>

  <!-- INTRO STYLE NETFLIX -->
  <div id="introScreen" class="intro-screen">
    <img src="logo.png" alt="Logo MonStreamTv" class="intro-logo" />
  </div>

  <div class="bg-gradient"></div>
 
  <main id="mainPage" class="phone-shell page-hidden">
    <section class="app-card">

      <!-- HEADER -->
      <header class="topbar">
        <div class="brand-zone">
          <img src="logo.png" alt="MonStreamTv" class="page-logo" />

          <span class="app-pill">
            <span class="status-dot"></span>
            <span id="configStatus">Chargement…</span>
          </span>
        </div>

        <button type="button" id="themeToggle" class="icon-btn" aria-label="Changer le thème">☼</button>
      </header>

      <!-- HERO -->
      <section class="hero">
        <p class="eyebrow"></p>
        <h1 id="pageTitle">Rechercher</h1>
        <p id="pageSubtitle" class="subtitle"></p>
      </section>

      <!-- SEARCH -->
      <form id="searchForm" class="search-card">
        <label for="searchInput" class="sr-only">Votre recherche</label>

        <div class="search-input-wrap">
          <span class="search-icon">⌕</span>
          <input
            id="searchInput"
            type="text"
            placeholder="Exemple : tracker, you, taken..."
            autocomplete="off"
          />
        </div>

        <div class="search-actions">
          <button type="submit" class="primary-btn" id="submitBtn">Rechercher</button>
          <button type="button" id="clearButton" class="secondary-btn">Effacer</button>
        </div>

        <p class="helper-text">Les résultats apparaissent pour les sites sélectionnés.</p>
      </form>

      <!-- RESULTS -->
      <section id="resultsPanel" class="results-panel hidden">
        <div class="results-head">
          <div>
            <h2>Recherches prêtes</h2>
            <p id="resultsInfo">Aucune recherche lancée.</p>
          </div>

          <button type="button" id="openAllBtn" class="chip-btn">Ouvrir tout</button>
        </div>

        <div id="resultsList" class="results-list"></div>
      </section>

      <!-- SITES -->
      <section class="section-head">
        <div>
          <h2>Sites de recherche</h2>
          <p id="selectionInfo">0 sélectionné</p>
        </div>

        <div class="toolbar-actions">
          <button type="button" id="selectAllBtn" class="chip-btn">Tout</button>
          <button type="button" id="unselectAllBtn" class="chip-btn">Aucun</button>
        </div>
      </section>

      <section id="siteGrid" class="site-grid" aria-live="polite"></section>

      <footer class="footer-note">Mise à jour régulière des liens</footer>

    </section>
  </main>

  <!-- TEMPLATE SITE -->
  <template id="siteCardTemplate">
    <label class="site-card">
      <input class="site-checkbox" type="checkbox" />

      <div class="site-card-inner">
        <div class="site-card-top">
          <div class="site-logo" aria-hidden="true"></div>
          <span class="toggle-indicator"></span>
        </div>

        <div class="site-body">
          <div class="site-copy">
            <h3 class="site-name"></h3>
            <p class="site-description"></p>
          </div>

          <a class="site-link" target="_blank" rel="noopener noreferrer">Ouvrir</a>
        </div>
      </div>
    </label>
  </template>

  <!-- TEMPLATE RESULT -->
  <template id="resultItemTemplate">
    <article class="result-item">
      <img class="result-logo" alt="" />

      <div class="result-copy">
        <h3 class="result-name"></h3>
        <p class="result-url"></p>
      </div>

      <a class="result-action" target="_blank" rel="noopener noreferrer">Voir les résultats</a>
    </article>
  </template>

  <div class="author">SnipDav</div>

  <script src="script.js?v=7"></script>

  <!-- SCRIPT INTRO -->
  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("introScreen").classList.add("intro-hidden");
        document.getElementById("mainPage").classList.remove("page-hidden");
      }, 2200);
    });
  </script>

</body>
</html>
